<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalSync — Dashboard de Emergencias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<!-- ALERTA ROJO -->
<div id="alerta-banner">
  <div class="alerta-msg">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
      <path d="M12 3L2 21h20L12 3z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
      <path d="M12 9v5M12 17h.01" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span id="alerta-texto">TRIAGE ROJO — PACIENTE EN ESTADO CRÍTICO</span>
  </div>
  <span style="font-size:11px; opacity:0.8;" id="alerta-uuid"></span>
</div>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.8" stroke-linecap="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">VitalSync</div>
      <div class="brand-sub">Centro de Comando · Sala de Emergencias</div>
    </div>
  </div>

  <div class="header-stats">
    <div class="stat-pill rojo">
      <span class="num" id="cnt-rojo">0</span>
      <span class="lbl">Críticos</span>
    </div>
    <div class="stat-pill amarillo">
      <span class="num" id="cnt-amarillo">0</span>
      <span class="lbl">Urgentes</span>
    </div>
    <div class="stat-pill verde">
      <span class="num" id="cnt-verde">0</span>
      <span class="lbl">Estables</span>
    </div>
    <div class="stat-pill">
      <span class="num" id="cnt-total">0</span>
      <span class="lbl">Activos</span>
    </div>
  </div>
</header>

<!-- STATUSBAR -->
<div class="statusbar">
  <div class="status-left">
    <div class="conn-indicator">
      <div class="conn-dot connecting" id="conn-dot"></div>
      <span class="conn-label connecting" id="conn-label">CONECTANDO...</span>
    </div>
    <span id="last-update">Sin datos aún</span>
  </div>
  <span id="clock">--:--:--</span>
</div>

<!-- MAIN -->
<main>
  <div class="section-label">Ambulancias activas en tiempo real</div>
  <div id="grid">
    <div id="empty-state">
      <div class="empty-icon">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="empty-text">Esperando señal de ambulancias...</div>
    </div>
  </div>
</main>

<script src="/js/dashboard.js"></script>
</body>
</html>
