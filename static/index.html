<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalSync — Dashboard de Emergencias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ── VARIABLES ─────────────────────────────────── */
  :root {
    --bg:           #060b14;
    --surface:      #0c1220;
    --surface2:     #111827;
    --border:       #1e2d45;
    --border-glow:  #1a3a5c;

    --rojo:         #ff2442;
    --rojo-glow:    rgba(255,36,66,0.35);
    --rojo-dim:     rgba(255,36,66,0.12);
    --amarillo:     #f5a623;
    --amarillo-glow:rgba(245,166,35,0.3);
    --amarillo-dim: rgba(245,166,35,0.10);
    --verde:        #00e5a0;
    --verde-glow:   rgba(0,229,160,0.25);
    --verde-dim:    rgba(0,229,160,0.08);

    --cyan:         #00c8e8;
    --cyan-dim:     rgba(0,200,232,0.15);
    --text:         #ccd8ed;
    --text-muted:   #4a6080;
    --text-bright:  #eaf2ff;

    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
    --cond: 'Barlow Condensed', sans-serif;
  }

  /* ── RESET ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,80,160,0.18) 0%, transparent 70%),
      linear-gradient(180deg, #060b14 0%, #04080f 100%);
    min-height: 100vh;
  }

  /* ── SCANLINES OVERLAY ─────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
  }

  /* ── HEADER ────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,11,20,0.95);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--cyan);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 12px rgba(0,200,232,0.4), inset 0 0 8px rgba(0,200,232,0.1);
  }

  .brand-icon svg { width: 20px; height: 20px; }

  .brand-name {
    font-family: var(--cond);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-bright);
  }

  .brand-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
  }

  .stat-pill .num {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--text-bright);
    line-height: 1;
  }

  .stat-pill .lbl {
    font-family: var(--cond);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stat-pill.rojo { border-color: var(--rojo); background: var(--rojo-dim); }
  .stat-pill.rojo .num { color: var(--rojo); }
  .stat-pill.amarillo { border-color: var(--amarillo); background: var(--amarillo-dim); }
  .stat-pill.amarillo .num { color: var(--amarillo); }
  .stat-pill.verde { border-color: var(--verde); background: var(--verde-dim); }
  .stat-pill.verde .num { color: var(--verde); }

  /* ── STATUSBAR ─────────────────────────────────── */
  .statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
  }

  .status-left { display: flex; align-items: center; gap: 20px; }

  .conn-indicator {
    display: flex; align-items: center; gap: 6px;
  }

  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .conn-dot.online {
    background: var(--verde);
    box-shadow: 0 0 8px var(--verde-glow);
    animation: pulse-dot 2s infinite;
  }

  .conn-dot.offline { background: var(--rojo); box-shadow: 0 0 6px var(--rojo-glow); }
  .conn-dot.connecting { background: var(--amarillo); animation: blink 0.8s infinite; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .conn-label { color: var(--text-muted); letter-spacing: 1px; }
  .conn-label.online  { color: var(--verde); }
  .conn-label.offline { color: var(--rojo); }
  .conn-label.connecting { color: var(--amarillo); }

  #clock {
    color: var(--cyan);
    letter-spacing: 2px;
  }

  #last-update {
    color: var(--text-muted);
    font-size: 10px;
  }

  /* ── MAIN GRID ─────────────────────────────────── */
  main {
    padding: 24px 28px;
  }

  .section-label {
    font-family: var(--cond);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── PACIENTE CARD ─────────────────────────────── */
  .card {
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    position: relative;
    transition: transform 0.2s, box-shadow 0.3s;
    animation: card-enter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes card-enter {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card:hover {
    transform: translateY(-2px);
  }

  /* Triage stripe en top */
  .card-stripe {
    height: 4px;
    width: 100%;
  }

  .card.ROJO    { border-color: var(--rojo);    box-shadow: 0 0 20px var(--rojo-glow); }
  .card.ROJO .card-stripe { background: var(--rojo); }

  .card.AMARILLO { border-color: var(--amarillo); }
  .card.AMARILLO .card-stripe { background: var(--amarillo); }

  .card.VERDE   { border-color: var(--verde); }
  .card.VERDE .card-stripe { background: var(--verde); }

  /* ROJO pulsing alert */
  .card.ROJO { animation: card-enter 0.4s cubic-bezier(0.16,1,0.3,1) forwards, rojo-pulse 2.5s ease-in-out 0.5s infinite; }

  @keyframes rojo-pulse {
    0%, 100% { box-shadow: 0 0 18px var(--rojo-glow); }
    50% { box-shadow: 0 0 36px rgba(255,36,66,0.55), 0 0 60px rgba(255,36,66,0.2); }
  }

  .card-body {
    padding: 14px 16px 16px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .patient-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .patient-id span {
    color: var(--cyan);
  }

  .triage-badge {
    font-family: var(--cond);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 4px;
  }

  .triage-badge.ROJO    { background: var(--rojo-dim);    color: var(--rojo);    border: 1px solid var(--rojo); }
  .triage-badge.AMARILLO{ background: var(--amarillo-dim); color: var(--amarillo); border: 1px solid var(--amarillo); }
  .triage-badge.VERDE   { background: var(--verde-dim);   color: var(--verde);   border: 1px solid var(--verde); }

  /* ── VITALS ROW ────────────────────────────────── */
  .vitals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .vital-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
  }

  .vital-label {
    font-family: var(--cond);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .vital-value {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--text-bright);
    line-height: 1;
    transition: color 0.3s;
  }

  .vital-unit {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 3px;
  }

  /* HR color coding */
  .vital-value.hr-high { color: var(--rojo); }
  .vital-value.hr-low  { color: var(--amarillo); }
  .vital-value.hr-ok   { color: var(--verde); }

  /* update flash */
  @keyframes flash-update {
    0%   { background: rgba(0,200,232,0.2); }
    100% { background: var(--surface2); }
  }

  .vital-block.updated {
    animation: flash-update 0.6s ease-out forwards;
  }

  /* ── CARD FOOTER ───────────────────────────────── */
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .card-timestamp {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-muted);
  }

  .card-estado {
    font-family: var(--cond);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cyan);
  }

  /* ── HEARTBEAT LINE ────────────────────────────── */
  .heartbeat-wrap {
    margin-top: 10px;
    height: 28px;
    overflow: hidden;
    position: relative;
  }

  .heartbeat-svg {
    width: 100%;
    height: 100%;
  }

  .hb-path {
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .card.ROJO    .hb-path { stroke: var(--rojo); }
  .card.AMARILLO .hb-path { stroke: var(--amarillo); }
  .card.VERDE   .hb-path { stroke: var(--verde); }

  /* ── EMPTY STATE ───────────────────────────────── */
  #empty-state {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 0;
    color: var(--text-muted);
  }

  .empty-icon {
    width: 60px; height: 60px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.4;
  }

  .empty-text {
    font-family: var(--cond);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── ALERTA ROJO OVERLAY ───────────────────────── */
  #alerta-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
    background: linear-gradient(90deg, var(--rojo), #c4001e);
    color: #fff;
    font-family: var(--cond);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transform: translateY(-100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 20px rgba(255,36,66,0.5);
  }

  #alerta-banner.visible {
    transform: translateY(0);
  }

  #alerta-banner .alerta-msg { display: flex; align-items: center; gap: 10px; }

  /* ── SCROLLBAR ─────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ALERTA ROJO -->
<div id="alerta-banner">
  <div class="alerta-msg">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
      <path d="M12 3L2 21h20L12 3z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
      <path d="M12 9v5M12 17h.01" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span id="alerta-texto">TRIAGE ROJO — PACIENTE EN ESTADO CRÍTICO</span>
  </div>
  <span style="font-size:11px; opacity:0.8;" id="alerta-uuid"></span>
</div>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.8" stroke-linecap="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">VitalSync</div>
      <div class="brand-sub">Centro de Comando · Sala de Emergencias</div>
    </div>
  </div>

  <div class="header-stats">
    <div class="stat-pill rojo">
      <span class="num" id="cnt-rojo">0</span>
      <span class="lbl">Críticos</span>
    </div>
    <div class="stat-pill amarillo">
      <span class="num" id="cnt-amarillo">0</span>
      <span class="lbl">Urgentes</span>
    </div>
    <div class="stat-pill verde">
      <span class="num" id="cnt-verde">0</span>
      <span class="lbl">Estables</span>
    </div>
    <div class="stat-pill">
      <span class="num" id="cnt-total">0</span>
      <span class="lbl">Activos</span>
    </div>
  </div>
</header>

<!-- STATUSBAR -->
<div class="statusbar">
  <div class="status-left">
    <div class="conn-indicator">
      <div class="conn-dot connecting" id="conn-dot"></div>
      <span class="conn-label connecting" id="conn-label">CONECTANDO...</span>
    </div>
    <span id="last-update">Sin datos aún</span>
  </div>
  <span id="clock">--:--:--</span>
</div>

<!-- MAIN -->
<main>
  <div class="section-label">Ambulancias activas en tiempo real</div>
  <div id="grid">
    <div id="empty-state">
      <div class="empty-icon">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="empty-text">Esperando señal de ambulancias...</div>
    </div>
  </div>
</main>

<script>
// ── ESTADO ───────────────────────────────────────────
const pacientes = new Map(); // uuid → { datos, card }
let ws = null;
let alertaTimeout = null;

// ── WEBSOCKET ─────────────────────────────────────────
const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL = `${protocol}//${window.location.host}/ws/vitales`;
function conectar() {
  setEstadoConexion('connecting');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setEstadoConexion('online');
    console.log('[VitalSync] WebSocket conectado');
  };

  ws.onmessage = (event) => {
    try {
      const datos = JSON.parse(event.data);
      procesarEvento(datos);
    } catch (e) {
      console.warn('[VitalSync] Evento no parseable:', e);
    }
  };

  ws.onclose = () => {
    setEstadoConexion('offline');
    console.log('[VitalSync] WebSocket desconectado — reintentando en 3s');
    setTimeout(conectar, 3000);
  };

  ws.onerror = () => {
    setEstadoConexion('offline');
    ws.close();
  };
}

function setEstadoConexion(estado) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className   = `conn-dot ${estado}`;
  label.className = `conn-label ${estado}`;
  const textos = { online: 'EN LÍNEA', offline: 'SIN CONEXIÓN', connecting: 'CONECTANDO...' };
  label.textContent = textos[estado] || estado;
}

// ── PROCESAMIENTO DE EVENTOS ──────────────────────────
function procesarEvento(datos) {
  const uuid = datos.ambulancia_id !== undefined
    ? `ambulancia-${datos.ambulancia_id}`
    : datos.paciente_uuid;
  if (!uuid) return;

  const uuidCorto = uuid.substring(0, 8).toUpperCase();
  const triage    = datos.triage || 'VERDE';
  const fc        = datos.frecuencia_cardiaca ?? '--';
  const pa        = datos.presion_arterial   ?? '--';
  const ts        = new Date().toLocaleTimeString('es-CO', { hour12: false });

  const esNuevo = !pacientes.has(uuid);

  if (esNuevo) {
    crearCard(uuid, uuidCorto, triage, fc, pa, ts);
  } else {
    actualizarCard(uuid, uuidCorto, triage, fc, pa, ts);
  }

  pacientes.set(uuid, { triage, fc, pa, ts });
  reordenarGrid();
  actualizarContadores();
  actualizarLastUpdate(ts);

  if (triage === 'ROJO') {
    mostrarAlertaRojo(uuidCorto);
    reproducirAlerta();
  }

  ocultarEmptyState();
}

// ── CREAR CARD ────────────────────────────────────────
function crearCard(uuid, uuidCorto, triage, fc, pa, ts) {
  const card = document.createElement('div');
  card.className = `card ${triage}`;
  card.id        = `card-${uuid}`;
  card.innerHTML = buildCardHTML(uuidCorto, triage, fc, pa, ts);
  document.getElementById('grid').appendChild(card);
  pacientes.set(uuid, { triage, fc, pa, ts, card });
}

// ── ACTUALIZAR CARD ───────────────────────────────────
function actualizarCard(uuid, uuidCorto, triage, fc, pa, ts) {
  const card = document.getElementById(`card-${uuid}`);
  if (!card) return;

  const prevTriage = pacientes.get(uuid)?.triage;

  // Actualizar clases de triage si cambió
  if (prevTriage !== triage) {
    card.className = `card ${triage}`;
  }

  // Actualizar valores con flash
  const fcEl = card.querySelector('.vital-fc');
  const paEl = card.querySelector('.vital-pa');
  const tsEl = card.querySelector('.card-timestamp');
  const badgeEl = card.querySelector('.triage-badge');

  if (fcEl) {
    fcEl.textContent = fc;
    fcEl.className = `vital-value hr-${getHRClass(fc)} vital-fc`;
    fcEl.closest('.vital-block').classList.remove('updated');
    void fcEl.closest('.vital-block').offsetWidth;
    fcEl.closest('.vital-block').classList.add('updated');
  }

  if (paEl) {
    paEl.textContent = pa;
    paEl.closest('.vital-block').classList.remove('updated');
    void paEl.closest('.vital-block').offsetWidth;
    paEl.closest('.vital-block').classList.add('updated');
  }

  if (tsEl) tsEl.textContent = ts;

  if (badgeEl) {
    badgeEl.className = `triage-badge ${triage}`;
    badgeEl.textContent = triage;
  }

  // Actualizar heartbeat SVG
  const hbPath = card.querySelector('.hb-path');
  if (hbPath) hbPath.setAttribute('d', generarECG());
}

function buildCardHTML(uuidCorto, triage, fc, pa, ts) {
  const hrClass = getHRClass(fc);
  return `
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="card-header">
        <div>
          <div class="patient-id">PACIENTE <span>${uuidCorto}...</span></div>
        </div>
        <div class="triage-badge ${triage}">${triage}</div>
      </div>
      <div class="vitals">
        <div class="vital-block">
          <div class="vital-label">Frec. Cardíaca</div>
          <div class="vital-value ${hrClass} vital-fc">${fc}<span class="vital-unit">bpm</span></div>
        </div>
        <div class="vital-block">
          <div class="vital-label">Presión Arterial</div>
          <div class="vital-value vital-pa">${pa}<span class="vital-unit">mmHg</span></div>
        </div>
      </div>
      <div class="heartbeat-wrap">
        <svg class="heartbeat-svg" viewBox="0 0 300 28" preserveAspectRatio="none">
          <path class="hb-path" d="${generarECG()}"/>
        </svg>
      </div>
      <div class="card-footer">
        <span class="card-timestamp">${ts}</span>
        <span class="card-estado">ACTIVO</span>
      </div>
    </div>
  `;
}

// ── HELPERS ────────────────────────────────────────────
function getHRClass(fc) {
  const v = parseInt(fc);
  if (isNaN(v)) return '';
  if (v > 100) return 'hr-high';
  if (v < 60)  return 'hr-low';
  return 'hr-ok';
}

function generarECG() {
  // Genera una onda ECG esquemática aleatoria
  const x0 = 0, y0 = 14;
  const pts = [
    [0, 14], [30, 14], [40, 14], [45, 10], [50, 14],

    [90, 14], [95, 11], [100, 14],
    [130, 14], [135, 10], [140, 14],

  ];

function reordenarGrid() {
  const grid = document.getElementById('grid');
  const cards = [...grid.querySelectorAll('.card')];
  const orden = { ROJO: 0, AMARILLO: 1, VERDE: 2 };
  cards.sort((a, b) => {
    const ta = a.classList.contains('ROJO') ? 0 : a.classList.contains('AMARILLO') ? 1 : 2;
    const tb = b.classList.contains('ROJO') ? 0 : b.classList.contains('AMARILLO') ? 1 : 2;
    return ta - tb;
  });
  cards.forEach(c => grid.appendChild(c));
}

function actualizarContadores() {

// ── AUDIO ALERT ────────────────────────────────────────
let audioCtx = null;
function reproducirAlerta() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    [0, 0.35, 0.7].forEach(offset => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.25, now + offset + 0.05);
      gain.gain.linearRampToValueAtTime(0, now + offset + 0.2);
      osc.start(now + offset);
      osc.stop(now + offset + 0.25);
    });
  } catch (e) {}
}
